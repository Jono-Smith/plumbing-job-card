
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <style>
        .label-width { width: 150px; }
    </style>
</head>
<body class="container-fluid bg-light">
    
    <br>
    <h1 class="text-center">Jobcard</h1>
    <br>

    <form action="">
        <!-- Details -->
        <section>
            <p class="text-secondary">Details</p>
            <div class="form-row">
                <!-- Client/Company -->
                <div class="input-group mb-3 col-md-6">
                    <div class="input-group-prepend">
                        <label class="input-group-text text-danger label-width" for="client">Client / Company</label>
                    </div>
                    <input type="text" class="form-control" id="client">
                </div>
                <!-- Date -->
                <div class="input-group mb-3 col-md-6">
                    <div class="input-group-prepend">
                        <label class="input-group-text text-danger label-width" for="date">Date</label>
                    </div>
                    <input type="date" class="form-control" id="date">
                </div>
            </div>
            <!-- Address -->
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                    <label class="input-group-text text-danger label-width" for="address">Address</label>
                </div>
                <input type="text" class="form-control" id="address">
            </div>
            <!-- Fault -->
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                    <label class="input-group-text text-danger label-width" for="fault">Fault</label>
                </div>
                <input type="text" class="form-control" id="fault">
            </div>
        </section>        
        <br>
        <hr>
        <br>

        <!-- Job -->
        <section>
            <p class="text-secondary">Job</p>
            <!-- Description -->
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                    <label class="input-group-text label-width" for="description">Description</label>
                </div>
                <textarea class="form-control" id="description" placeholder="" required></textarea>
            </div>
            <!-- Materials -->
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                    <label class="input-group-text label-width" for="materials">Materials</label>
                </div>
                <textarea class="form-control" id="materials" placeholder="" required></textarea>
            </div>
            <div class="form-row">
                <div class="input-group mb-3 col-md-4">
                    <div class="input-group-prepend">
                        <label class="input-group-text label-width" for="startTime">Start Time</label>
                    </div>
                    <input type="time" class="form-control" id="startTime">
                </div>
                <div class="input-group mb-3 col-md-4">
                    <div class="input-group-prepend">
                        <label class="input-group-text label-width" for="endTime">End Time</label>
                    </div>
                    <input type="time" class="form-control" id="endTime">
                </div>
                <div class="input-group mb-3 col-md-4">
                    <div class="input-group-prepend">
                        <label class="input-group-text label-width" for="completedDate">Completion Date</label>
                    </div>
                    <input type="date" class="form-control" id="completedDate">
                </div>
            </div>
            <div class="form-row">
                <!-- Division -->
                <div class="input-group mb-3 col-md-6">
                    <div class="input-group-prepend">
                        <label class="input-group-text label-width" for="division">Division</label>
                    </div>
                    <select class="custom-select">
                        <option selected></option>
                        <option value="plumbing">Plumbing</option>
                        <option value="projects">Projects</option>
                    </select>
                </div>
                <!-- Person -->
                 <div class="input-group mb-3 col-md-6">
                    <div class="input-group-prepend">
                        <label class="input-group-text label-width" for="Person">Person</label>
                    </div>
                    <select class="custom-select">
                        <option selected></option>
                        <option value="jono">Jono</option>
                        <option value="martin">Martin</option>
                        <option value="pieter">Pieter</option>
                    </select>
                </div>
            </div>
            <!-- Comments -->
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                    <label class="input-group-text label-width" for="comments">Comments</label>
                </div>
                <textarea class="form-control" id="comments" placeholder="" required></textarea>
            </div>
        </section>
        <br>
        <hr>
        <br>

        <p class="text-secondary">Client</p>

        <div class="form-row">
            <div class="input-group mb-3 col-md-6">
                <div class="input-group-prepend">
                    <label class="input-group-text label-width" for="name">Name</label>
                </div>
                <input type="text" class="form-control" id="name">
            </div>
            <div class="input-group mb-3 col-md-6">
                <div class="input-group-prepend">
                    <label class="input-group-text label-width" for="designation">Designation</label>
                </div>
                <input type="text" class="form-control" id="designation">
            </div>
        </div>
        <div class="form-row">
            <div class="input-group mb-3 col-md-6">
                <div class="input-group-prepend">
                    <label class="input-group-text label-width" for="number">Contact Number</label>
                </div>
                <input type="text" class="form-control" id="number">
            </div>
            <div class="input-group mb-3 col-md-6">
                <div class="input-group-prepend">
                    <label class="input-group-text label-width" for="email">Email</label>
                </div>
                <input type="email" class="form-control" id="email">
            </div>
        </div>
        <br>
        <!-- <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Job Completed?</label>
        </div> -->
        
        <div class="d-flex justify-content-center">
            <button type="submit" class="btn btn-primary w-25 p-3">Submit</button>
        </div>
    </form>
    <br>
</body>
</html>
